<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Group M</title>

    <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  🛡️ حارس localStorage — يعمل قبل React بـ milliseconds     ║
    ║  يمنع ضياع بيانات الجهاز عند فتح الموقع من روابط مختلفة   ║
    ╚══════════════════════════════════════════════════════════════╝
    -->
    <script>
      (function() {
        'use strict';

        // المفاتيح المحمية
        var DEVICE_KEYS = [
          'group_m_device_primary',
          'group_m_device_bk1',
          'group_m_device_bk2',
          'group_m_devices_list'
        ];

        var GH_KEYS = [
          'gh_token_primary',
          'gh_token_backup_1',
          'gh_token_backup_2',
          'gh_owner', 'gh_repo', 'gh_branch', 'gh_data_path', 'gh_last_sha'
        ];

        var ALL_KEYS = DEVICE_KEYS.concat(GH_KEYS).concat([
          'group_m_config', 'group_m_users', 'group_m_installations'
        ]);

        // تحقق إن localStorage شغال
        var lsOk = false;
        try {
          localStorage.setItem('__t', '1');
          lsOk = localStorage.getItem('__t') === '1';
          localStorage.removeItem('__t');
        } catch(e) {}

        if (!lsOk) return; // Private Mode — مش نقدر نعمل حاجه

        // استرجاع من sessionStorage لو localStorage فاضي
        ALL_KEYS.forEach(function(key) {
          try {
            var lsVal = localStorage.getItem(key);
            if (!lsVal || lsVal === 'null' || lsVal === 'undefined') {
              // localStorage فاضي — نجيب من sessionStorage
              var ssVal = sessionStorage.getItem('__guard__' + key);
              if (ssVal && ssVal !== 'null' && ssVal !== 'undefined') {
                localStorage.setItem(key, ssVal);
                console.info('[IndexGuard] ✅ استُرد: ' + key);
              }
            } else {
              // localStorage تمام — نحدث sessionStorage
              sessionStorage.setItem('__guard__' + key, lsVal);
            }
          } catch(e) {}
        });

        // إضافة: نتأكد إن مفاتيح الجهاز الثلاثة متزامنة مع بعض
        var primary = null;
        try { primary = localStorage.getItem('group_m_device_primary'); } catch(e) {}
        var bk1 = null;
        try { bk1 = localStorage.getItem('group_m_device_bk1'); } catch(e) {}
        var bk2 = null;
        try { bk2 = localStorage.getItem('group_m_device_bk2'); } catch(e) {}

        var bestVal = primary || bk1 || bk2;
        if (bestVal) {
          // نتأكد إن الثلاثة موجودين
          if (!primary) try { localStorage.setItem('group_m_device_primary', bestVal); } catch(e) {}
          if (!bk1)     try { localStorage.setItem('group_m_device_bk1', bestVal); } catch(e) {}
          if (!bk2)     try { localStorage.setItem('group_m_device_bk2', bestVal); } catch(e) {}
        }

      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
